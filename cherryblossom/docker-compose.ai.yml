services:
  ollama:
    image: ollama/ollama:latest
    volumes:
    - ollama-data:/root/.ollama
    deploy:
      resources:
        limits:
          cpus: '8.00'
          memory: 24G
        reservations:
          cpus: '0.50'
          memory: 1G
          devices:
          - driver: nvidia
            count: all
            capabilities:
            - gpu
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    ports:
    - 127.0.0.1:11434:11434

  picoclaw-gateway:
    build:
      context: /home/khayyam/dev/pico-claw
      dockerfile: Dockerfile
      args:
        DOCKER_GID: ${DOCKER_GID:-965}
    image: picoclaw-gateway:local
    deploy:
      resources:
        limits:
          cpus: '2.00'
          memory: 512M
        reservations:
          cpus: '0.05'
          memory: 32M
          devices:
          - driver: nvidia
            count: all
            capabilities:
            - gpu
    environment:
      TZ: America/New_York
      TERM: xterm-256color
      OLLAMA_API_KEY: ollama-local
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      GH_TOKEN: ${GH_TOKEN:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      DIGITALOCEAN_ACCESS_TOKEN: ${DIGITALOCEAN_ACCESS_TOKEN:-}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      GOG_KEYRING_BACKEND: file
      GOG_KEYRING_PASSWORD: openclaw
      XDG_CONFIG_HOME: /workspace/.config
    volumes:
    - ${PICOCLAW_CONFIG_DIR:-~/.picoclaw}:/root/.picoclaw
    - ${PICOCLAW_WORKSPACE_DIR:-~/.picoclaw/workspace}:/workspace
    - /var/run/docker.sock:/var/run/docker.sock:rw
    ports:
    - 127.0.0.1:18800:18800
    extra_hosts:
    - host.docker.internal:host-gateway
    init: true
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:18800/health > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  searxng:
    image: searxng/searxng:latest
    volumes:
    - ./searxng-settings.yml:/etc/searxng/settings.yml:ro
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
      SEARXNG_SECRET: ${SEARXNG_SECRET:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M

  stable-diffusion:
    image: ghcr.io/ai-dock/stable-diffusion-webui-forge:latest-cuda
    volumes:
    - sd-models:/opt/stable-diffusion-webui-forge/models
    - sd-outputs:/opt/stable-diffusion-webui-forge/outputs
    environment:
      CLI_ARGS: --api --listen --medvram-sdxl --xformers
    deploy:
      resources:
        limits:
          cpus: '8.00'
          memory: 16G
        reservations:
          cpus: '0.50'
          memory: 2G
          devices:
          - driver: nvidia
            count: all
            capabilities:
            - gpu
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7860/sdapi/v1/options > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    ports:
    - 127.0.0.1:7860:7860

  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_URL: https://gpu.k5m.sh
      WEBUI_AUTH: 'true'
      WEBUI_SESSION_COOKIE_SECURE: 'true'
      WEBUI_SESSION_COOKIE_SAME_SITE: none
      ENABLE_SIGNUP: 'false'
      ENABLE_IMAGE_GENERATION: 'true'
      IMAGE_GENERATION_ENGINE: automatic1111
      AUTOMATIC1111_BASE_URL: http://stable-diffusion:7860
      ENABLE_RAG_WEB_SEARCH: 'true'
      RAG_WEB_SEARCH_ENGINE: searxng
      SEARXNG_QUERY_URL: http://searxng:8080/search?q=<query>&format=json
    volumes:
    - open-webui-data:/app/backend/data
    ports:
    - 127.0.0.1:3100:8080
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      searxng:
        condition: service_healthy
      stable-diffusion:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.00'
          memory: 1G
        reservations:
          cpus: '0.10'
          memory: 128M
    labels:
      com.centurylinklabs.watchtower.enable: 'true'

  envoy:
    image: envoyproxy/envoy:v1.32-latest
    volumes:
    - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    - ./filter.lua:/etc/envoy/filter.lua:ro
    ports:
    - 127.0.0.1:11435:11434
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9901'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 128M
        reservations:
          cpus: '0.02'
          memory: 32M

volumes:
  ollama-data:
    external: true
    name: open-claw_ollama-data
  open-webui-data:
  sd-models:
  sd-outputs:
