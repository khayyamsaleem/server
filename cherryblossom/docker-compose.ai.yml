services:
  ollama-mgmt:
    image: ollama/ollama:latest
    volumes:
    - ollama-data:/root/.ollama
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 512M
        reservations:
          cpus: '0.05'
          memory: 64M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    ports:
    - 127.0.0.1:11434:11434

  ollama-3090:
    image: ollama/ollama:latest
    volumes:
    - ollama-data:/ollama-models:ro
    deploy:
      resources:
        limits:
          cpus: '8.00'
          memory: 30G
        reservations:
          cpus: '0.50'
          memory: 1G
          devices:
          - driver: nvidia
            device_ids: ['1']
            capabilities:
            - gpu
    environment:
      OLLAMA_MODELS: /ollama-models/models
      OLLAMA_MAX_LOADED_MODELS: 1
      OLLAMA_NUM_GPU: 999
      OLLAMA_FLASH_ATTENTION: 1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ollama-1080ti:
    image: ollama/ollama:latest
    volumes:
    - ollama-data:/ollama-models:ro
    deploy:
      resources:
        limits:
          cpus: '4.00'
          memory: 12G
        reservations:
          cpus: '0.25'
          memory: 512M
          devices:
          - driver: nvidia
            device_ids: ['0']
            capabilities:
            - gpu
    environment:
      OLLAMA_MODELS: /ollama-models/models
      OLLAMA_MAX_LOADED_MODELS: 1
      OLLAMA_NUM_GPU: 999
      OLLAMA_FLASH_ATTENTION: 1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  picoclaw-gateway:
    build:
      context: /home/khayyam/dev/pico-claw
      dockerfile: Dockerfile
      args:
        DOCKER_GID: ${DOCKER_GID:-965}
    image: picoclaw-gateway:local
    deploy:
      resources:
        limits:
          cpus: '2.00'
          memory: 512M
        reservations:
          cpus: '0.05'
          memory: 32M
    environment:
      TZ: America/New_York
      TERM: xterm-256color
      OLLAMA_API_KEY: ollama-local
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      GH_TOKEN: ${GH_TOKEN:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      DIGITALOCEAN_ACCESS_TOKEN: ${DIGITALOCEAN_ACCESS_TOKEN:-}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      GOG_KEYRING_BACKEND: file
      GOG_KEYRING_PASSWORD: openclaw
      XDG_CONFIG_HOME: /workspace/.config
    volumes:
    - ${PICOCLAW_CONFIG_DIR:-~/.picoclaw}:/root/.picoclaw
    - ${PICOCLAW_WORKSPACE_DIR:-~/.picoclaw/workspace}:/workspace
    - /var/run/docker.sock:/var/run/docker.sock:rw
    ports:
    - 127.0.0.1:18800:18800
    extra_hosts:
    - host.docker.internal:host-gateway
    init: true
    restart: unless-stopped
    depends_on:
      ollama-3090:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:18800/health > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  searxng:
    image: searxng/searxng:latest
    volumes:
    - ./searxng-settings.yml:/etc/searxng/settings.yml:ro
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
      SEARXNG_SECRET: ${SEARXNG_SECRET:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M

  forge-init:
    image: alpine/git:latest
    volumes:
    - sd-data:/data
    - ./sd-provision.sh:/provision.sh:ro
    entrypoint: ["/bin/sh", "/provision.sh"]
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 256M

  forge:
    image: ghcr.io/ai-dock/stable-diffusion-webui-forge:latest-cuda
    depends_on:
      forge-init:
        condition: service_completed_successfully
    volumes:
    - sd-data:/opt/storage
    - type: volume
      source: sd-data
      target: /opt/stable-diffusion-webui-forge/extensions/adetailer
      volume:
        subpath: extensions/adetailer
      read_only: true
    - type: volume
      source: sd-data
      target: /opt/stable-diffusion-webui-forge/models/Lora
      volume:
        subpath: stable_diffusion/models/lora
    - type: volume
      source: sd-data
      target: /opt/stable-diffusion-webui-forge/models/text_encoder
      volume:
        subpath: stable_diffusion/models/text_encoder
    - type: volume
      source: sd-data
      target: /opt/stable-diffusion-webui-forge/models/VAE/flux
      volume:
        subpath: stable_diffusion/models/flux_vae
    environment:
      FORGE_ARGS: --api --listen --xformers --always-offload-from-vram
    deploy:
      resources:
        limits:
          cpus: '8.00'
          memory: 24G
        reservations:
          cpus: '0.50'
          memory: 2G
          devices:
          - driver: nvidia
            device_ids: ['1']
            capabilities:
            - gpu
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:17860/sdapi/v1/options > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    entrypoint: ["/bin/bash", "-c", "/patches/owui-patch.sh && exec bash start.sh"]
    environment:
      # --- Core ---
      RESET_CONFIG_ON_START: 'true'
      OLLAMA_BASE_URL: http://ollama-gateway:11434
      WEBUI_URL: https://gpu.k5m.sh
      WEBUI_AUTH: 'true'
      WEBUI_SESSION_COOKIE_SECURE: 'true'
      WEBUI_SESSION_COOKIE_SAME_SITE: none
      ENABLE_SIGNUP: 'false'
      ENABLE_API_KEYS: 'true'
      TASK_MODEL: igorls/gemma-4-E4B-it-heretic-GGUF:latest
      # --- Image generation (Forge on 3090, Pony default) ---
      ENABLE_IMAGE_GENERATION: 'true'
      ENABLE_IMAGE_PROMPT_GENERATION: 'true'
      IMAGE_GENERATION_ENGINE: automatic1111
      IMAGE_GENERATION_MODEL: ponyDiffusionV6XL.safetensors
      AUTOMATIC1111_BASE_URL: http://ollama-gateway:17860
      AUTOMATIC1111_PARAMS: '{"sampler_name": "DPM++ 2M", "cfg_scale": 7.0}'
      IMAGE_SIZE: 1216x832
      IMAGE_STEPS: 25
      IMAGE_PROMPT_GENERATION_PROMPT_TEMPLATE: |
        ### Task:
        Generate a Stable Diffusion prompt and select the best model based on the user's request.

        ### Model Selection:
        - NSFW/explicit/sexual content OR scenes with people: use "ponyDiffusionV6XL.safetensors"
        - SFW without people (landscapes, food, products, architecture): use "sd_xl_base_1.0.safetensors"

        ### Prompt Format Rules:
        - Always start with: "score_9, score_8_up, score_7_up, realistic, raw photo, dslr"
        - Use danbooru-style tags separated by commas
        - For people: add "film grain, skin pores, skin texture, detailed face, detailed hands, anatomically correct"
        - For non-people subjects: focus on subject detail, lighting, composition, material textures. No body tags.
        - Only add "nsfw, explicit" if the request is clearly sexual
        - Always target photorealistic output

        ### Output:
        Return ONLY valid JSON:
        {
            "model": "ponyDiffusionV6XL.safetensors or sd_xl_base_1.0.safetensors",
            "prompt": "score_9, score_8_up, score_7_up, realistic, raw photo, dslr, [your tags]",
            "negative_prompt": "score_1, score_2, score_3, anime, cartoon, drawing, painting, illustration, 3d render, blurry, low quality, deformed, watermark, text"
        }

        ### Chat History:
        <chat_history>
        {{MESSAGES:END:6}}
        </chat_history>
      # --- Search ---
      ENABLE_RAG_WEB_SEARCH: 'true'
      RAG_WEB_SEARCH_ENGINE: searxng
      SEARXNG_QUERY_URL: http://searxng:8080/search?q=<query>&format=json
    volumes:
    - open-webui-data:/app/backend/data
    - ./owui-patch.sh:/patches/owui-patch.sh:ro
    ports:
    - 127.0.0.1:3100:8080
    restart: unless-stopped
    depends_on:
      ollama-gateway:
        condition: service_healthy
      searxng:
        condition: service_healthy
      forge:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.00'
          memory: 1G
        reservations:
          cpus: '0.10'
          memory: 128M
    labels:
      com.centurylinklabs.watchtower.enable: 'false'

  ollama-gateway:
    image: envoyproxy/envoy:v1.32-latest
    command: ["envoy", "-c", "/etc/envoy/envoy.yaml", "--concurrency", "1"]
    volumes:
    - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    - ./filter.lua:/etc/envoy/filter.lua:ro
    - ./forge_filter.lua:/etc/envoy/forge_filter.lua:ro
    ports:
    - 127.0.0.1:11435:11434
    - 9901:9901
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9901'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 128M
        reservations:
          cpus: '0.02'
          memory: 32M

volumes:
  ollama-data:
    external: true
    name: open-claw_ollama-data
  open-webui-data:
  sd-data:
