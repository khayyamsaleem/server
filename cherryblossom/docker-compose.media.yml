services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    user: 1000:1000
    volumes:
    - /home/khayyam/dev/jellyfin/config:/config
    - /home/khayyam/dev/jellyfin/cache:/cache
    - /mnt/jellydrive-01/jellyfin_media:/media
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=America/New_York
    ports:
    - 8096:8096
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8096/health > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '4.00'
          memory: 2G
        reservations:
          cpus: '0.10'
          memory: 256M

  jellyfin-exporter:
    image: rebelcore/jellyfin-exporter:latest
    environment:
    - JELLYFIN_ADDRESS=http://jellyfin:8096
    - JELLYFIN_TOKEN=${JELLYFIN_EXPORTER_TOKEN}
    ports:
    - 9594:9594
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9594/metrics > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 32M
        reservations:
          cpus: '0.01'
          memory: 16M

