services:
  node-exporter:
    image: prom/node-exporter:latest
    pid: host
    volumes:
    - /proc:/host/proc:ro
    - /sys:/host/sys:ro
    - /:/rootfs:ro
    command:
    - --path.procfs=/host/proc
    - --path.sysfs=/host/sys
    - --path.rootfs=/rootfs
    - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9100/metrics > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
        reservations:
          cpus: '0.01'
          memory: 16M

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    privileged: true
    volumes:
    - /:/rootfs:ro
    - /var/run:/var/run:ro
    - /sys:/sys:ro
    - /var/lib/docker/:/var/lib/docker:ro
    - /dev/disk/:/dev/disk:ro
    devices:
    - /dev/kmsg
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M

  network-exporter:
    image: syepes/network_exporter:latest
    cap_add:
    - NET_ADMIN
    - NET_RAW
    network_mode: host
    volumes:
    - ./network_exporter.yml:/app/cfg/network_exporter.yml:ro
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9427/metrics > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
        reservations:
          cpus: '0.01'
          memory: 16M

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    network_mode: host
    depends_on:
      network-exporter:
        condition: service_healthy
    volumes:
    - ./otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    environment:
    - VICTORIA_HOST=${VICTORIA_HOST}
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 128M
        reservations:
          cpus: '0.01'
          memory: 32M

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:latest
    cap_add:
    - SYS_ADMIN
    command: ["-f", "/etc/dcgm-exporter/custom-counters.csv"]
    volumes:
    - ./dcgm-counters.csv:/etc/dcgm-exporter/custom-counters.csv:ro
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/9400; echo -e \"GET /metrics HTTP/1.0\\r\\n\\r\\n\" >&3; head -c1 <&3 > /dev/null'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
          devices:
          - driver: nvidia
            device_ids: ['0', '1']
            capabilities:
            - gpu
            - utility

  promtail:
    image: grafana/promtail:latest
    extra_hosts:
    - "loki:${LOKI_HOST}"
    volumes:
    - ./promtail-config.yml:/etc/promtail/config.yml
    - /var/run/docker.sock:/var/run/docker.sock
    - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    healthcheck:
      test: ["CMD", "/usr/bin/promtail", "-check-syntax", "-config.file=/etc/promtail/config.yml"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 128M
        reservations:
          cpus: '0.02'
          memory: 32M
