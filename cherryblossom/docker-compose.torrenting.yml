services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
    - NET_ADMIN
    devices:
    - /dev/net/tun:/dev/net/tun
    ports:
    - 9091:9091
    - 51413:51413/tcp
    - 51413:51413/udp
    environment:
    - VPN_SERVICE_PROVIDER=nordvpn
    - VPN_TYPE=wireguard
    - WIREGUARD_PRIVATE_KEY=${NORDVPN_WG_PRIVATE_KEY}
    - SERVER_COUNTRIES=${VPN_COUNTRY:-United States}
    - TZ=America/New_York
    - FIREWALL_VPN_INPUT_PORTS=51413
    - FIREWALL_OUTBOUND_SUBNETS=100.64.0.0/10,192.168.0.0/16,10.0.0.0/8,172.0.0.0/8
    volumes:
    - gluetun-data:/gluetun
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.02'
          memory: 64M

  flood-ui:
    image: alpine:latest
    command: >
      sh -c "if [ ! -f /ui/.version ] || [ \"$$(cat /ui/.version)\" != 'v1.0.1' ]; then
        apk add --no-cache curl unzip &&
        curl -L -o /tmp/flood.zip https://github.com/johman10/flood-for-transmission/releases/download/v1.0.1/flood-for-transmission.zip &&
        rm -rf /ui/* &&
        unzip /tmp/flood.zip -d /ui &&
        echo 'v1.0.1' > /ui/.version &&
        echo 'Flood UI downloaded';
      else
        echo 'Flood UI already up to date';
      fi"
    volumes:
    - flood-ui:/ui
    restart: "no"

  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission
    network_mode: container:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
      flood-ui:
        condition: service_completed_successfully
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=America/New_York
    - USER=${TRANSMISSION_USER}
    - PASS=${TRANSMISSION_PASS}
    - PEERPORT=51413
    - TRANSMISSION_WEB_HOME=/flood-ui/flood-for-transmission
    volumes:
    - transmission-config:/config
    - /mnt/jellydrive-01/jellyfin_media:/downloads
    - /home/khayyam/Downloads:/watch
    - flood-ui:/flood-ui:ro
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    deploy:
      resources:
        limits:
          cpus: '2.00'
          memory: 512M
        reservations:
          cpus: '0.05'
          memory: 64M

volumes:
  gluetun-data:
  transmission-config:
  flood-ui:
