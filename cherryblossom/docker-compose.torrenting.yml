services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
    - NET_ADMIN
    devices:
    - /dev/net/tun:/dev/net/tun
    environment:
    - VPN_SERVICE_PROVIDER=${VPN_PROVIDER}
    - VPN_TYPE=wireguard
    - WIREGUARD_PRIVATE_KEY=${VPN_WG_PRIVATE_KEY}
    - WIREGUARD_ADDRESSES=${VPN_WG_ADDRESSES}
    - SERVER_COUNTRIES=${VPN_COUNTRY}
    - TZ=America/New_York
    # Allow inbound peer connections on Transmission's peer port through the VPN
    # tunnel interface (tun0). Without this, gluetun's iptables rules drop all
    # incoming traffic on the VPN side even if the provider forwards the port.
    # Matches PEERPORT in the transmission service below.
    - FIREWALL_VPN_INPUT_PORTS=51413
    # Exempt local/private subnets from the VPN tunnel so container-to-container
    # and LAN traffic doesn't get routed through the VPN:
    #   100.64.0.0/10  - Tailscale CGNAT range (tailscale ip -4)
    #   192.168.0.0/16 - LAN (ip route | grep 'proto kernel')
    #   10.0.0.0/8     - Docker bridge networks (docker network inspect bridge --format '{{range .IPAM.Config}}{{.Subnet}}{{end}}')
    #   172.0.0.0/8    - Docker compose networks (docker network inspect cherryblossom_default --format '{{range .IPAM.Config}}{{.Subnet}}{{end}}')
    - FIREWALL_OUTBOUND_SUBNETS=100.64.0.0/10,192.168.0.0/16,10.0.0.0/8,172.0.0.0/8
    volumes:
    - gluetun-data:/gluetun
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.02'
          memory: 64M

  flood-ui:
    image: alpine:latest
    command: >
      sh -c "if [ ! -f /ui/.version ] || [ \"$$(cat /ui/.version)\" != 'v1.0.1' ]; then
        apk add --no-cache curl unzip &&
        curl -L -o /tmp/flood.zip https://github.com/johman10/flood-for-transmission/releases/download/v1.0.1/flood-for-transmission.zip &&
        rm -rf /ui/* &&
        unzip /tmp/flood.zip -d /ui &&
        echo 'v1.0.1' > /ui/.version &&
        echo 'Flood UI downloaded';
      else
        echo 'Flood UI already up to date';
      fi"
    volumes:
    - flood-ui:/ui
    restart: "no"

  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission
    network_mode: container:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
      flood-ui:
        condition: service_completed_successfully
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=America/New_York
    - USER=${TRANSMISSION_USER}
    - PASS=${TRANSMISSION_PASS}
    - PEERPORT=51413
    - TRANSMISSION_WEB_HOME=/flood-ui/flood-for-transmission
    volumes:
    - transmission-config:/config
    - /mnt/jellydrive-01/jellyfin_media:/downloads
    - /home/khayyam/Downloads:/watch
    - flood-ui:/flood-ui:ro
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
      com.centurylinklabs.watchtower.depends-on: gluetun
    deploy:
      resources:
        limits:
          cpus: '2.00'
          memory: 512M
        reservations:
          cpus: '0.05'
          memory: 64M

  transmission-exporter:
    image: ghcr.io/khayyamsaleem/transmission-exporter:latest
    environment:
    - TRANSMISSION_ADDR=http://gluetun:9091
    - TRANSMISSION_USERNAME=${TRANSMISSION_USER}
    - TRANSMISSION_PASSWORD=${TRANSMISSION_PASS}
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
      com.centurylinklabs.watchtower.depends-on: gluetun
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:19091/metrics > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 32M
        reservations:
          cpus: '0.01'
          memory: 16M

volumes:
  gluetun-data:
  transmission-config:
  flood-ui:
