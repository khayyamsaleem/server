<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 56">
  <defs>
    <radialGradient id="tip" cx="1" cy="0.5" r="0.6" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#66bbff"/>
      <stop offset="50%" stop-color="#0087ff"/>
      <stop offset="100%" stop-color="#0055aa" stop-opacity="0.4"/>
    </radialGradient>
    <radialGradient id="tipglow" cx="0.9" cy="0.5" r="0.8" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0087ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0087ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- JUUL text — blocky/thick like MOTD -->
  <text x="2" y="33" font-family="monospace" font-weight="900" font-size="38" fill="#0087ff" letter-spacing="5" stroke="#0087ff" stroke-width="1.5" paint-order="stroke">JUUL</text>
  <!-- Juul device as underline — fitted to text width -->
  <g transform="translate(2, 46)">
    <!-- Battery/body -->
    <rect x="0" y="-3.5" width="68" height="7" rx="3.5" fill="#111111"/>
    <!-- Pod section -->
    <rect x="68" y="-3.5" width="20" height="7" rx="2.5" fill="#1a1a1a"/>
    <!-- Seam between body and pod -->
    <line x1="68" y1="-3.5" x2="68" y2="3.5" stroke="#333" stroke-width="0.5"/>
    <!-- Mouthpiece tip -->
    <rect x="88" y="-3" width="10" height="6" rx="3" fill="#222222"/>
    <!-- Blue LED glow halo -->
    <ellipse cx="100" cy="0" rx="8" ry="6" fill="url(#tipglow)"/>
    <!-- Blue LED light -->
    <circle cx="99" cy="0" r="3" fill="url(#tip)"/>
  </g>
</svg>
