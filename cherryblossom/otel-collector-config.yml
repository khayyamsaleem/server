receivers:
  prometheus:
    config:
      scrape_configs:
        - job_name: network
          scrape_interval: 30s
          static_configs:
            - targets:
                - localhost:9427
              labels:
                host: cherryblossom

processors:
  transform:
    metric_statements:
      - context: datapoint
        statements:
          - set(attributes["job"], resource.attributes["service.name"])
          - set(attributes["instance"], resource.attributes["service.instance.id"])

exporters:
  otlphttp:
    metrics_endpoint: http://${env:VICTORIA_HOST}:8428/opentelemetry/api/v1/push
    tls:
      insecure: true

service:
  pipelines:
    metrics:
      receivers: [prometheus]
      processors: [transform]
      exporters: [otlphttp]
