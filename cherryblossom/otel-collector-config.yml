receivers:
  prometheus:
    config:
      scrape_configs:
        - job_name: network
          scrape_interval: 30s
          static_configs:
            - targets:
                - localhost:9427
              labels:
                host: cherryblossom

exporters:
  prometheusremotewrite:
    endpoint: http://${env:VICTORIA_HOST}:8428/api/v1/write

service:
  pipelines:
    metrics:
      receivers: [prometheus]
      exporters: [prometheusremotewrite]
