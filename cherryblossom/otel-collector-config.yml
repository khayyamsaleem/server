receivers:
  prometheus:
    config:
      scrape_configs:
        - job_name: network
          scrape_interval: 30s
          static_configs:
            - targets:
                - localhost:9427
              labels:
                host: cherryblossom

exporters:
  otlphttp:
    endpoint: http://${env:VICTORIA_HOST}:8428/opentelemetry
    tls:
      insecure: true

service:
  pipelines:
    metrics:
      receivers: [prometheus]
      exporters: [otlphttp]
