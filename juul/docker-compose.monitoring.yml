services:
  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    networks:
    - webgateway
    extra_hosts:
    - "cherryblossom:${CHERRYBLOSSOM_IP}"
    volumes:
    - ${DATA_DIR}/victoriametrics:/victoria-metrics-data
    - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
    - --storageDataPath=/victoria-metrics-data
    - --retentionPeriod=30d
    - --promscrape.config=/etc/prometheus/prometheus.yml
    - --httpListenAddr=:8428
    - --loggerFormat=json
    - --opentelemetry.usePrometheusNaming
    - --memory.allowedPercent=60
    - --search.maxMemoryPerQuery=32MB
    - --search.maxConcurrentRequests=2
    environment:
    - GOMEMLIMIT=280MiB
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8428/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.02'
          memory: 128M

  grafana:
    image: grafana/grafana:latest
    networks:
    - webgateway
    volumes:
    - ${DATA_DIR}/grafana:/var/lib/grafana
    - ./grafana/provisioning:/etc/grafana/provisioning
    - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
    - GF_SECURITY_ADMIN_USER=admin
    - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    - GF_SERVER_ROOT_URL=https://grafana.khayyam.me
    - GF_LOG_CONSOLE_FORMAT=json
    - GF_UNIFIED_ALERTING_ENABLED=false
    - GOMEMLIMIT=200MiB
    labels:
      traefik.enable: 'true'
      traefik.http.routers.grafana.rule: Host(`grafana.khayyam.me`)
      traefik.http.routers.grafana.entrypoints: https
      traefik.http.services.grafana.loadbalancer.server.port: '3000'
      traefik.docker.network: juul_webgateway
      com.centurylinklabs.watchtower.enable: 'true'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 384M
        reservations:
          cpus: '0.02'
          memory: 128M

  node-exporter:
    image: prom/node-exporter:latest
    networks:
    - webgateway
    pid: host
    volumes:
    - /proc:/host/proc:ro
    - /sys:/host/sys:ro
    - /:/rootfs:ro
    command:
    - --path.procfs=/host/proc
    - --path.sysfs=/host/sys
    - --path.rootfs=/rootfs
    - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9100/metrics > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 48M
        reservations:
          cpus: '0.01'
          memory: 16M

  tailscale-exporter:
    image: adinhodovic/tailscale-exporter:latest
    networks:
    - webgateway
    environment:
    - TAILSCALE_OAUTH_CLIENT_ID=${TAILSCALE_OAUTH_CLIENT_ID}
    - TAILSCALE_OAUTH_CLIENT_SECRET=${TAILSCALE_OAUTH_CLIENT_SECRET}
    - TAILSCALE_TAILNET=${TAILSCALE_TAILNET}
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9250/metrics > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 32M
        reservations:
          cpus: '0.01'
          memory: 16M

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    networks:
    - webgateway
    privileged: true
    volumes:
    - /:/rootfs:ro
    - /var/run:/var/run:ro
    - /sys:/sys:ro
    - /var/lib/docker/:/var/lib/docker:ro
    - /dev/disk/:/dev/disk:ro
    devices:
    - /dev/kmsg
    command:
    - --housekeeping_interval=30s
    - --docker_only=true
    - --disable_metrics=advtcp,cpu_topology,cpuset,hugetlb,memory_numa,percpu,perf_event,process,referenced_memory,resctrl,sched,tcp,udp
    - --store_container_labels=false
    - --event_storage_event_limit=default=0
    - --event_storage_age_limit=default=0
    environment:
    - GOMEMLIMIT=140MiB
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 192M
        reservations:
          cpus: '0.02'
          memory: 64M

