services:
  tailscale:
    image: tailscale/tailscale
    hostname: juul-docker
    networks:
    - default
    - webgateway
    extra_hosts:
    - "cherryblossom:${CHERRYBLOSSOM_IP}"
    environment:
    - TS_AUTHKEY=${TS_AUTHKEY}
    - TS_STATE_DIR=/var/lib/tailscale
    - TS_USERSPACE=true
    - TS_SERVE_CONFIG=/config/serve.json
    volumes:
    - ${DATA_DIR}/tailscale-state/_data:/var/lib/tailscale
    - ./tailscale-serve.json:/config/serve.json:ro
    ports:
    - 80:80
    - 443:443
    - 10022:10022
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 96M
        reservations:
          cpus: '0.01'
          memory: 32M

  proxy:
    image: traefik:latest
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_healthy
    environment:
    - DO_AUTH_TOKEN
    - CF_DNS_API_TOKEN
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - ./traefik.yml:/etc/traefik/traefik.yml
    - ${DATA_DIR}/acme:/etc/traefik/acme
    - ./dynamic:/etc/traefik/dynamic
    labels:
      traefik.enable: 'true'
      traefik.http.routers.traefik.rule: Host(`proxy.khayyam.me`)
      traefik.http.routers.traefik.service: api@internal
      traefik.http.routers.traefik.middlewares: auth
      traefik.http.routers.traefik.entrypoints: https
      traefik.http.services.traefik.loadbalancer.server.port: '8080'
      traefik.http.middlewares.auth.basicauth.users: $HTTP_AUTH
      com.centurylinklabs.watchtower.enable: 'true'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.01'
          memory: 32M

  watchtower:
    image: containrrr/watchtower
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    environment:
    - WATCHTOWER_CLEANUP=true
    - WATCHTOWER_SCHEDULE=0 0 4 * * *
    - WATCHTOWER_LABEL_ENABLE=true
    - DOCKER_API_VERSION=1.45
    - WATCHTOWER_LOG_FORMAT=JSON
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/watchtower", "--health-check"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 64M
        reservations:
          cpus: '0.01'
          memory: 16M

