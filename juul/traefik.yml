global:
  sendAnonymousUsage: false
serversTransport:
  insecureSkipVerify: true
entryPoints:
  http:
    address: :80
    http:
      redirections:
        entryPoint:
          to: https
          scheme: https
  ssh:
    address: :10022
  https:
    address: :443
    http:
      tls:
        certresolver: leresolver
        domains:
        - main: khayyam.me
          sans:
          - '*.khayyam.me'
        - main: k5m.sh
          sans:
          - '*.k5m.sh'
providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true
  docker:
    endpoint: unix:///var/run/docker.sock
    exposedByDefault: false
api:
  dashboard: true
  insecure: true
log:
  level: INFO
  format: json
certificatesResolvers:
  leresolver:
    acme:
      email: khayyam.saleem@gmail.com
      storage: /etc/traefik/acme/acme.json
      dnsChallenge:
        provider: cloudflare
metrics:
  prometheus:
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true
accessLog:
  format: json
  filters:
    statusCodes:
    - 200-599
ping: {}
